<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заметка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-content">
    <div class="container">
        <h1>Заметка</h1>
        <input type="text" id="note-title" placeholder="Заголовок" class="note-input">
        <textarea id="note-text" placeholder="Текст заметки..." class="note-input" rows="20"></textarea>
        <div class="btn-group">
            <button id="save-btn" class="btn"><article>Подтвердить</article></button>
            <button id="cancel-btn" class="btn"><article>Отмена</article></button>
            <button id="delete-btn" class="btn danger"><article>Удалить</article></button>
        </div>
    </div>
    </main>

    <footer class="site-footer">
        <p>Все права защищены. Наверное</p>
    </footer>

    <script src="note.js"></script>
</body>
</html>
